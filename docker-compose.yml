
services:
  frontend:
    build:
      context: ./src/frontend/MyAIRunningMate-UI
      dockerfile: Dockerfile.RunningMateUI
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:7002/api
    volumes:
      - ./src/frontend/MyAIRunningMate-UI:/app
      - /app/node_modules
    depends_on:
      dotnet-api:
        condition: service_started
      python-api:
        condition: service_healthy

  dotnet-api:
    build:
      context: ./src/backend
      dockerfile: MyAIRunningMate/MyAIRunningMate.Service/Dockerfile.NetApi
    ports:
      - "7002:7002"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:7002
      Strava__CallbackUrl: http://localhost:7002/api/strava/callback
      Frontend__DashboardUrl: http://localhost:5173/upload
      PythonApi__BaseUrl: http://python-api:8000/
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://127.0.0.1:5173
    depends_on:
      python-api:
        condition: service_healthy

  python-api:
    build:
      context: ./src/backend/MyAIRunningMate.Python
      dockerfile: Dockerfile.PythonApi
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: http://localhost:5173,http://localhost:7002,http://127.0.0.1:5173
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_HOST: http://ollama:11434
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: runningmate-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        ollama serve &
        sleep 5
        echo "=== Pulling gemma4:31b-cloud ==="
        ollama pull gemma4:31b-cloud
        wait
    restart: unless-stopped

volumes:
  ollama_storage: